<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Mechanic Job Tracker - Customer</title>
        <link rel="stylesheet" href="../css/style.css">
        </style>
    </head>
    
    <body>

    <h1>Request a Mechanic Job</h1>

        <div>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name" placeholder="John Doe">
        </div>
        <div>
            <label for="carModel">Car Model: </label>
            <input type="text" id="carModel" name="carModel" placeholder="Volkswagen Beetle">
        </div>
        <div>
            <label for="description">Description: </label>
            <textarea id="description" name="description" placeholder="The brakes are squeaking" cols="30" rows="8"></textarea>
        </div>

        <button type="submit">Submit</button>

        <hr>

        <h2>Current Jobs:</h2>

        <div>
            <!-- Jobs will appear here later -->
        </div>

    </body>

</html>
